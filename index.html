<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="6" y1="12" x2="10" y2="12"></line>
                    <line x1="8" y1="10" x2="8" y2="14"></line>
                    <line x1="15" y1="13" x2="15.01" y2="13"></line>
                    <line x1="18" y1="11" x2="18.01" y2="11"></line>
                    <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                </svg>
                Video Game Tracker
            </h1>
            <nav>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Buscar juego...">
                    <button id="search-button" aria-label="Buscar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
                <button id="add-game-btn" class="btn-primary">Añadir Juego</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="filters-section">
            <div class="filter-group">
                <div class="select-wrapper">
                    <label for="limit-select">Por página:</label>
                    <select id="limit-select">
                        <option value="6">6</option>
                        <option value="12" selected>12</option>
                        <option value="24">24</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <label for="sort-select">Ordenar por:</label>
                    <select id="sort-select">
                        <option value="created_at" selected>Fecha de creación</option>
                        <option value="title">Título</option>
                        <option value="release_year">Año de lanzamiento</option>
                        <option value="genre">Género</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="order-select">
                        <option value="desc" selected>Descendente</option>
                        <option value="asc">Ascendente</option>
                    </select>
                </div>
                <div class="results-info">
                    <span id="results-count">0 videojuegos</span>
                </div>
            </div>
            <div class="export-group">
                <button id="export-csv-btn" class="btn-secondary">Exportar CSV</button>
                <button id="export-xlsx-btn" class="btn-secondary">Exportar Excel</button>
            </div>
        </section>

        <section id="games-section">
            <div id="games-grid" class="games-grid">
                <p class="loading">Cargando videojuegos...</p>
            </div>

            <div id="pagination" class="pagination"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Video Game Tracker · Proyecto Web UVG 2025</p>
            <a href="http://localhost:8080/swagger/index.html" target="_blank" class="swagger-link">Ver Documentación de API (Swagger)</a>
        </div>
    </footer>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Añadir Nuevo Juego</h2>
            <form id="game-form">y
                <input type="hidden" id="game-id">
                <div class="form-group">
                    <label for="title">Título *</label>
                    <input type="text" id="title" required maxlength="255">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="genre">Género</label>
                        <input type="text" id="genre" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="platform">Plataforma</label>
                        <input type="text" id="platform" maxlength="100">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="developer">Desarrollador</label>
                        <input type="text" id="developer" maxlength="255">
                    </div>
                    <div class="form-group">
                        <label for="release_year">Año</label>
                        <input type="number" id="release_year" min="1970" max="2030">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="image_url">URL de Imagen (opcional)</label>
                    <input type="url" id="image_url" placeholder="https://...">
                    <img id="image-preview" alt="Preview" style="display: none; width: 100%; max-height: 200px; object-fit: cover; margin-top: 1rem; border-radius: 8px;">
                </div>
                <div id="image-upload-section" class="form-group">
                    <label for="image-file">Subir Imagen (Máx 1MB)</label>
                    <input type="file" id="image-file" accept="image/jpeg,image/png,image/webp">
                </div>
                <button type="submit" class="btn-block">Guardar Juego</button>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="confirm-content">
            <h2 id="confirm-title">¿Estás seguro?</h2>
            <p id="confirm-message">Esta acción no se puede deshacer.</p>
            <div class="confirm-actions">
                <button id="confirm-cancel" class="btn-secondary">Cancelar</button>
                <button id="confirm-ok" class="btn-danger">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
